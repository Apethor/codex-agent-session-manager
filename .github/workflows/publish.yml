name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: npm dist-tag to assign during publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - alpha
          - next

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use trusted-publishing capable npm
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Smoke
        run: npm run smoke

      - name: Security smoke
        run: npm run security:smoke

      - name: Security scan
        run: npm run security:scan

      - name: Production audit
        run: npm run audit:prod

      - name: Package validation
        run: npm run pack:validate

      - name: Read package version
        id: package
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Refuse already-published version
        shell: bash
        run: |
          if npm view "codex-agent-session-manager@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::codex-agent-session-manager@${PACKAGE_VERSION} is already published"
            exit 1
          fi
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}

      - name: Publish
        shell: bash
        run: npm publish --tag "$NPM_DIST_TAG"
        env:
          NPM_DIST_TAG: ${{ inputs.dist_tag }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "Published codex-agent-session-manager@${PACKAGE_VERSION}"
            echo ""
            echo "dist-tag: ${NPM_DIST_TAG}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          NPM_DIST_TAG: ${{ inputs.dist_tag }}
